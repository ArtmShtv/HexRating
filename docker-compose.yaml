services:

  backend:
    build: .
    container_name: django_app
    ports:
      - "8000:8000"
    networks:
      - network_1
    depends_on:
      - redis
    environment:
      SECRET_KEY: ${DJANGO_SECRET_KEY}
      DEBUG: ${DJANGO_DEBUG}
      ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
    env_file:
     - .env
     

  redis:
    image: redis:latest
    container_name: django_redis
    ports:
      - "6379:6379"
    networks:
      - network_1
    command: redis-server --appendonly yes
    restart: always
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
        
volumes:
    redis_data:
        driver: local

networks:
  network_1:
    name: network_1